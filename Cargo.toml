[package]
name = "quork"
version = "0.1.1"
license = "MIT"
description = "A collection of small things that make interacting with the system easier"
keywords = ["admin", "sys"]
authors = ["Juliette Cordor"]
documentation = "https://docs.rs/quork"
repository = "https://github.com/jewlexx/quork.git"
homepage = "https://github.com/jewlexx/quork.git"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
cfg-if = "1.0.0"
cty = "0.2.2"
error-code = "2.3.1"
strum = { version = "0.24.0", features = ["derive"] }
thiserror = "1.0.31"

[target.'cfg(windows)'.dependencies]
winapi = "0.3.9"
clipboard-win = "4.4.1"

[target.'cfg(unix)'.dependencies]
x11-clipboard = "0.6.1"

[build-dependencies]
cc = "1.0.73"
pkg-config = "0.3.25"
regex = "1.5.5"
